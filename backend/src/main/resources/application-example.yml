server:
  port: 8080

spring:
  application:
    name: paper-rewrite
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/paper_rewrite?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 你的数据库密码
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

rewrite-api:
  api-key: 你的API密钥
  text-url: https://rapi.ycjg.top/api/v2/paraphrase
  document-url: https://rapi.ycjg.top/api/v2/document/paraphrase
  default-preset-en: aimove_weipu_english

sms:
  url: 你的短信接口地址

logging:
  level:
    com.youdao.paper: info
